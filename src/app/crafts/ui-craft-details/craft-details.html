<div class="card-body">
  <div>
    <h2 class="card-title text-4xl">{{ craft().name }}</h2>
    <p class="text-lg">Model: {{ craft().model }}</p>
    <p class="text-sm">Manufactured by: {{ craft().manufacturer }}</p>
  </div>
  <div class="divider text-xl">Stats</div>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <app-stat-tile title="Cost" [value]="craft().costInCredits" description="Galactic Credits" />
    <app-stat-tile title="Length" [value]="craft().length" description="meters" />
    <app-stat-tile title="Crew" [value]="craft().crew" description="Minimum to pilot" />
    <app-stat-tile title="Passengers" [value]="craft().passengers" description="people can be transported" />
    <app-stat-tile title="Cargo Capacity" [value]="craft().cargoCapacity" description="kg" />
    <app-stat-tile title="Consumables" [value]="craft().consumables" description="before resupply" />
    <ng-content select="[extra-stats]" />
  </div>
  <div class="divider text-xl">Class & Appearances</div>
  <div class="flex flex-col sm:flex-row gap-2">
    <div class="flex-1">
      <div class="text-lg">Class</div>
      <div class="badge badge-outline badge-info">{{ craftClass() }}</div>
    </div>
    <div class="flex-1 sm:text-right">
      <div class="text-lg">Appeared in</div>
      <div class="flex flex-wrap sm:justify-end gap-2">
        @for (title of moviesCraftAppearsIn(); track $index) {
          <div class="badge badge-outline badge-accent">
            {{ title }}
          </div>
        }
      </div>
    </div>
  </div>
</div>
